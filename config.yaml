host: "0.0.0.0"
port: 8080

oidc:
  issuer_url: "https://your-oidc-provider.example.com"
  client_id: "your-client-id"
  redirect_url: "http://chihiro.example.com/auth/callback"

redis:
  addr: "redis:6379"
  session_ttl: 3600

cluster:
  domain: "clusters.example.com"
  port: 443

  # Kubernetes versions available for new clusters
  available_versions:
    - "v1.31.2"
    - "v1.30.6"

  # Groups that get full admin access (all clusters, all params)
  admin_groups:
    - platform-admins

  # Groups allowed to create clusters
  creator_groups:
    - platform-admins
    - developers

  # Hard limits on total cluster resources across the fleet
  limits:
    max_clusters: 10
    max_total_nodes: 50
    max_total_cp: 9

  # --- Injections: built-in fields that map cluster form values to spec paths ---
  injections:
    name: metadata.name
    version: spec.topology.version
    serviceDomain: spec.clusterNetwork.serviceDomain
    controlPlaneReplicas: spec.topology.controlPlane.replicas
    nodes: spec.topology.workers.machineDeployments[0].replicas

  # --- Template: the CAPI cluster object rendered on creation ---
  # Use {{ chihiro.<key> }} placeholders for dynamic values.
  # Built-in tokens: {{ chihiro.version }}, {{ chihiro.name }}, {{ chihiro.podCIDR }}, {{ chihiro.serviceCIDR }}
  template: |
    apiVersion: cluster.x-k8s.io/v1beta2
    kind: Cluster
    metadata:
      name: ignore
      namespace: default
      labels:
        managed-by: chihiro
        team: {{ chihiro.team }}
    spec:
      clusterNetwork:
        pods:
          cidrBlocks:
            - {{ chihiro.podCIDR }}
        serviceDomain: ignore
        services:
          cidrBlocks:
            - {{ chihiro.serviceCIDR }}
      topology:
        class: my-infra-class
        controlPlane:
          replicas: {{ chihiro.controlPlaneReplicas }}
        workers:
          machineDeployments:
            - class: default-worker
              name: worker
              replicas: {{ chihiro.nodes }}
        version: "0.0.0"

  # --- Parameters: dynamic form fields for the cluster creation UI ---
  # Supported types: string, number, select, boolean
  # Each parameter becomes a {{ chihiro.<key> }} placeholder in the template.
  parameters:
    # String input
    podCIDR:
      label: "Pod CIDR"
      description: "CIDR block for pod networking"
      type: string
      default: "10.244.0.0/16"

    serviceCIDR:
      label: "Service CIDR"
      description: "CIDR block for service networking"
      type: string
      default: "10.96.0.0/12"

    # Select with constrained options (image changes based on version)
    imageName:
      label: "Node Image"
      description: "OS image for cluster nodes"
      type: select
      editable: true
      options:
        - value: "ubuntu-24.04-k8s-{{ chihiro.version }}"
          label: "Ubuntu 24.04"
          constrain:
            version: ["v1.31.2", "v1.30.6"]
        - value: "ubuntu-22.04-k8s-{{ chihiro.version }}"
          label: "Ubuntu 22.04"
          constrain:
            version: ["v1.30.6"]
      default: "ubuntu-24.04-k8s-{{ chihiro.version }}"

    # Number input with min/max
    controlPlaneReplicas:
      label: "Control Plane Replicas"
      description: "Number of control plane nodes (odd numbers recommended)"
      type: number
      default: "3"
      min: 1
      max: 9
      editable: true
      path: spec.topology.controlPlane.replicas

    nodes:
      label: "Worker Nodes"
      description: "Number of worker nodes"
      type: number
      default: "2"
      min: 0
      max: 20

    # Boolean toggle with custom true/false values
    enableCilium:
      label: "Cilium CNI"
      description: "Use Cilium as the CNI instead of the default"
      type: boolean
      default: true
      true_value: "cilium"
      false_value: "default"
      editable: true
      path: "metadata.labels.'example.com/cni'"

    # String input editable post-creation via injection path
    serviceDomain:
      label: "Service Domain"
      description: "DNS domain for cluster services"
      type: string
      default: "cluster.local"
      editable: true
      path: spec.clusterNetwork.serviceDomain

    # Admin-only parameter (only visible to admin_groups)
    team:
      label: "Team"
      description: "Owning team (used as label)"
      type: string
      default: "platform"
      visible_groups:
        - platform-admins
