oidc:
  issuer_url: 'https://zitadel.bealv.io'
  client_id: '340711715261909669'
  # Set via environment variables: OIDC_CLIENT_SECRET, SESSION_KEY
  # client_secret: ''  # Use OIDC_CLIENT_SECRET env var
  # session_key: ''    # Use SESSION_KEY env var (32+ random bytes recommended)
  redirect_url: 'http://localhost:8080/auth/callback'
redis:
  addr: 'localhost:6379'
  username: ''
  # SECURITY: Set via REDIS_PASSWORD environment variable
  # password: ''  # Use REDIS_PASSWORD env var
  session_ttl: 3600
cluster:
  domain: 'bealv.io'
  port: 443
  available_versions:
    - 'v1.34.0'
  admin_groups:
    - kube-admin
  creator_groups:
    - cluster-creators
  limits:
    max_clusters: 2
    max_total_nodes: 2
  # Cluster template as raw YAML string
  template: |
    apiVersion: cluster.x-k8s.io/v1beta1
    kind: Cluster
    metadata:
      name: PLACEHOLDER_NAME
      namespace: capi-system
      labels:
        capsule: "true"
        cert-manager: "true"
        cni: cilium
        external-dns: "false"
        external-secret: "false"
        external-snapshotter: "true"
        fluxcd: "true"
        ingress-controller: "false"
        ingress-replication: "true"
        monitoring: "false"
        proxmox-csi: "true"
        velero: "false"
    spec:
      clusterNetwork:
        pods:
          cidrBlocks:
            - 172.16.0.0/16
        serviceDomain: PLACEHOLDER_SERVICE_DOMAIN
        services:
          cidrBlocks:
            - 172.17.0.0/16
      topology:
        class: kamaji-proxmox
        controlPlane:
          replicas: 3
        variables:
          - name: dnsServers
            value:
              - 10.250.0.1
          - name: templateID
            value: 997
          - name: templateAltID
            value: 997
        version: PLACEHOLDER_VERSION
        workers:
          machineDeployments:
            - class: default-worker
              name: worker
              replicas: PLACEHOLDER_NODES
  # Field mapping: specify where to inject the node count
  node_count_path: 'spec.topology.workers.machineDeployments[0].replicas'
