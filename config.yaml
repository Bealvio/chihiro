# Chihiro Configuration
# All values can be overridden with environment variables using the CHIHIRO_ prefix
# Example: oidc.issuer_url can be set with CHIHIRO_OIDC_ISSUER_URL

# OIDC Authentication Configuration
oidc:
  issuer_url: 'https://zitadel.bealv.io'  # CHIHIRO_OIDC_ISSUER_URL
  client_id: '340711715261909669'          # CHIHIRO_OIDC_CLIENT_ID
  # client_secret: ''                      # CHIHIRO_OIDC_CLIENT_SECRET (required, use env var)
  # session_key: ''                        # CHIHIRO_SESSION_KEY (required, 32+ bytes, use env var)
  redirect_url: 'http://localhost:8080/auth/callback'  # CHIHIRO_OIDC_REDIRECT_URL

# Redis Configuration (for session storage)
redis:
  addr: 'localhost:6379'      # CHIHIRO_REDIS_ADDR
  username: ''                # CHIHIRO_REDIS_USERNAME
  # password: ''              # CHIHIRO_REDIS_PASSWORD (use env var for security)
  session_ttl: 5           # CHIHIRO_SESSION_TTL (seconds, default: 3600)

# Server Configuration
# host: '0.0.0.0'             # CHIHIRO_HOST (default: 0.0.0.0)
# port: 8080                  # CHIHIRO_PORT (default: 8080)

# Documentation URL (optional) - CHIHIRO_DOCS_URL
docs_url: 'https://doc.bealv.io'

# Cluster Management Configuration
cluster:
  domain: 'bealv.io'          # CHIHIRO_CLUSTER_DOMAIN
  port: 443                   # CHIHIRO_CLUSTER_PORT

  # Available Kubernetes versions for new clusters - CHIHIRO_AVAILABLE_VERSIONS (comma-separated)
  available_versions:
    - 'v1.34.0'

  # Admin groups (full access to all clusters) - CHIHIRO_ADMIN_GROUPS (comma-separated)
  admin_groups:
    - kube-admin

  # Creator groups (can create and manage their own clusters) - CHIHIRO_CREATOR_GROUPS (comma-separated)
  creator_groups:
    - kube-user

  # Resource limits
  limits:
    max_clusters: 2           # CHIHIRO_MAX_CLUSTERS - Maximum clusters per tenant
    max_total_nodes: 2        # CHIHIRO_MAX_TOTAL_NODES - Maximum total nodes across all clusters

  # Cluster template as raw YAML string
  # Placeholders: PLACEHOLDER_NAME, PLACEHOLDER_VERSION, PLACEHOLDER_NODES, PLACEHOLDER_SERVICE_DOMAIN
  template: |
    apiVersion: cluster.x-k8s.io/v1beta1
    kind: Cluster
    metadata:
      name: PLACEHOLDER_NAME
      namespace: capi-system
      labels:
        capsule: "true"
        cert-manager: "true"
        cni: cilium
        external-dns: "false"
        external-secret: "false"
        external-snapshotter: "true"
        fluxcd: "true"
        ingress-controller: "false"
        ingress-replication: "true"
        monitoring: "false"
        proxmox-csi: "true"
        velero: "false"
    spec:
      clusterNetwork:
        pods:
          cidrBlocks:
            - 172.16.0.0/16
        serviceDomain: PLACEHOLDER_SERVICE_DOMAIN
        services:
          cidrBlocks:
            - 172.17.0.0/16
      topology:
        class: kamaji-proxmox
        controlPlane:
          replicas: 3
        variables:
          - name: dnsServers
            value:
              - 10.250.0.1
          - name: templateID
            value: 997
          - name: templateAltID
            value: 997
        version: PLACEHOLDER_VERSION
        workers:
          machineDeployments:
            - class: default-worker
              name: worker
              replicas: PLACEHOLDER_NODES

  # Field mapping: specify where to inject the node count
  node_count_path: 'spec.topology.workers.machineDeployments[0].replicas'
