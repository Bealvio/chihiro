# Chihiro Configuration
# All values can be overridden with environment variables using the CHIHIRO_ prefix
# Example: oidc.issuer_url can be set with CHIHIRO_OIDC_ISSUER_URL

docs_url: "https://docs.rpcu.io/" # CHIHIRO_DOCS_URL

host: "0.0.0.0" # CHIHIRO_HOST
port: 8080 # CHIHIRO_PORT

oidc:
  issuer_url: "https://rpcu-gabeck.eu1.zitadel.cloud" # CHIHIRO_OIDC_ISSUER_URL
  client_id: "377008652088841031" # CHIHIRO_OIDC_CLIENT_ID
  # client_secret: ''                                  # CHIHIRO_OIDC_CLIENT_SECRET (use env var)
  # session_key: ''                                    # CHIHIRO_SESSION_KEY (use env var)
  redirect_url: "http://localhost:8080/auth/callback" # CHIHIRO_OIDC_REDIRECT_URL

redis:
  addr: "127.0.0.1:6379" # CHIHIRO_REDIS_ADDR
  username: ""
  # password: ''                                          # CHIHIRO_REDIS_PASSWORD (use env var)
  session_ttl: 7200

cluster:
  domain: "mgmt.rpcu.lan"
  port: 443
  available_versions:
    - "v1.36.1"
  admin_groups:
    - kube-admin
  creator_groups:
    - kube-admin
  limits:
    max_clusters: 5
    max_total_nodes: 10
    max_total_cp: 9
  # Per-worker-group form fields shown in the create/edit UI. Each entry only
  # describes one input; WHERE its value lands in the CAPI machineDeployment is
  # decided entirely by worker_group_template below. This keeps the two
  # concerns separate: fields = what the user types, template = the YAML shape.
  #
  # Per-field keys:
  #   label:    UI label (defaults to a humanized key)
  #   type:     input type — "string" | "number" | "select"
  #   options:  allowed values when type is "select" (list of strings)
  #   default:  pre-filled value in the form
  #   required: when true, the field must be non-empty (default false)
  #   min/max:  numeric bounds when type is "number"
  #   order:    integer controlling left-to-right display order (lower first;
  #             ties broken alphabetically by key)
  #
  # Add a new field by adding an entry here and referencing it in the template
  # as {{ chihiro.field.<key> }}.
  worker_group_fields:
    name:
      label: "Group name"
      type: string
      required: true
      order: 0
    class:
      label: "Class"
      type: select
      options:
        - default-worker
      default: default-worker
      order: 1
    flavor:
      label: "Flavor"
      type: select
      options:
        - small
        - medium
        - xmedium
        - large
        - xlarge
      default: xmedium
      order: 2
    replicas:
      label: "Replicas"
      type: number
      default: "1"
      min: 1
      max: 10
      order: 3
  # YAML template for ONE machineDeployment entry. It is rendered once per
  # worker group and appended to spec.topology.workers.machineDeployments.
  #
  # Placeholders:
  #   {{ chihiro.field.<key> }}  -> the value the user entered for that field
  #                                 (numbers are emitted unquoted)
  #   {{ chihiro.* }}            -> the same built-ins available in the cluster
  #                                 template (name, version, ...)
  #
  # This is the only place that knows your ClusterClass shape: to drop the
  # ClusterClass patch, just remove the variables.overrides block; to expose a
  # new variable, add it here and a matching field above.
  worker_group_template: |
    name: {{ chihiro.field.name }}
    class: {{ chihiro.field.class }}
    replicas: {{ chihiro.field.replicas }}
    variables:
      overrides:
        - name: workerFlavor
          value: {{ chihiro.field.flavor }}
  # Built-in cluster fields injected at the given YAML path after the template
  # is parsed. Set editable: true to expose a post-creation edit button in the
  # UI and allow the matching API to accept changes; min/max bound numeric
  # fields. label is shown in the UI.
  injections:
    name:
      path: metadata.name
    version:
      path: spec.topology.version
      label: "Kubernetes Version"
      editable: true
    serviceDomain:
      path: spec.clusterNetwork.serviceDomain
    # groups has no YAML path (stored as a Chihiro annotation), but can still be
    # marked editable to expose the access-groups edit button.
    groups:
      label: "Access Groups"
      editable: true
    workerGroups:
      path: spec.topology.workers.machineDeployments
      label: "Worker Groups"
      editable: true
    controlPlaneReplicas:
      path: spec.topology.controlPlane.replicas
      label: "Control Plane Replicas"
      editable: true
      min: 1
      max: 9
  template: |
    apiVersion: cluster.x-k8s.io/v1beta2
    kind: Cluster
    metadata:
      namespace: mgmt
      labels:
        sveltos.argus.rpcu.io/oidc-rbac: {{ chihiro.oidcRbac }}
        sveltos.argus.rpcu.io/cilium: {{ chihiro.cilium }}
        type: workload
    spec:
      clusterNetwork:
        pods:
          cidrBlocks:
            - {{ chihiro.podCIDR }}
        serviceDomain: ignore
        services:
          cidrBlocks:
            - {{ chihiro.serviceCIDR }}
      topology:
        classRef:
          name: openstack-kamaji
        controlPlane:
          replicas: 0
        variables:
          - name: identityRef
            value:
              name: mgmt-cloud-config
              cloudName: openstack
          - name: externalNetworkId
            value: 1cfd69da-057c-4748-a0d4-de5b0ca77db2
          - name: imageName
            value: {{ chihiro.imageName }}
          - name: oidc
            value:
              enabled: true
              issuerURL: https://rpcu-gabeck.eu1.zitadel.cloud
              clientID: "377050089077613929"
          - name: managedSubnetCIDR
            value: {{ chihiro.managedSubnetCIDR }}
        version: "0.0.0"
  parameters:
    podCIDR:
      label: "Pod CIDR"
      description: "CIDR block for pod networking"
      type: string
      default: "10.207.0.0/16"
    serviceCIDR:
      label: "Service CIDR"
      description: "CIDR block for service networking"
      type: string
      default: "10.107.0.0/16"
    imageName:
      label: "Node Image"
      description: "OpenStack image for cluster nodes"
      type: select
      options:
        - "hephaestus-kaas-25.11-{{ chihiro.version }}"
        - "hephaestus-kaas-26.05-{{ chihiro.version }}"
      default: "hephaestus-kaas-26.05-{{ chihiro.version }}"
    managedSubnetCIDR:
      label: "Managed Subnet CIDR"
      description: "CIDR block for the managed subnet"
      type: string
      default: "192.168.1.0/24"
    # Boolean (checkbox) addon toggles. Rendered as on/off tickboxes; the
    # configured true_value/false_value strings are substituted into the
    # template at {{ chihiro.<key> }}. Setting editable + path lets the toggle
    # be flipped after creation (the value is written to that YAML path on the
    # live Cluster). Label keys contain dots, so single-quote that path segment.
    cilium:
      label: "Cilium CNI"
      description: "Enable the Cilium addon via Sveltos"
      type: boolean
      default: true
      true_value: enabled
      false_value: disabled
      editable: true
      path: "metadata.labels.'sveltos.argus.rpcu.io/cilium'"
    oidcRbac:
      label: "OIDC RBAC"
      description: "Enable OIDC RBAC addon via Sveltos"
      type: boolean
      default: true
      true_value: enabled
      false_value: disabled
      editable: true
      path: "metadata.labels.'sveltos.argus.rpcu.io/oidc-rbac'"
