apiVersion: v1
kind: ConfigMap
metadata:
  name: chihiro-config
data:
  config.yaml: |
    oidc:
      issuer_url: 'https://your-oidc-issuer.com'  # REPLACE with your OIDC issuer URL
      client_id: 'your-client-id'  # REPLACE with your OIDC client ID
      # Set via environment variables: OIDC_CLIENT_SECRET, SESSION_KEY
      # client_secret: ''  # Use OIDC_CLIENT_SECRET env var
      # session_key: ''    # Use SESSION_KEY env var (32+ random bytes recommended)
      redirect_url: 'http://chihiro.example.com/auth/callback'  # REPLACE with your callback URL
    redis:
      addr: 'redis:6379'
      username: ''
      # SECURITY: Set via REDIS_PASSWORD environment variable
      # password: ''  # Use REDIS_PASSWORD env var
      session_ttl: 3600
    cluster:
      domain: 'cluster.local'  # REPLACE with your cluster domain
      port: 443
      available_versions:
        - 'v1.34.0'  # REPLACE with your available Kubernetes versions
      admin_groups:
        - kube-admin  # REPLACE with your admin groups (full access to all clusters)
      creator_groups:
        - kube-admin  # REPLACE with groups that can create/edit/delete clusters
        - cluster-creators  # Users in these groups can manage clusters they created or share groups with
      limits:
        max_clusters: 2  # Maximum clusters per user
        max_total_nodes: 2  # Maximum total nodes per user
      # Cluster template as raw YAML string - CUSTOMIZE for your infrastructure
      template: |
        apiVersion: cluster.x-k8s.io/v1beta1
        kind: Cluster
        metadata:
          name: PLACEHOLDER_NAME
          namespace: default
          labels:
            managed-by: chihiro
        spec:
          clusterNetwork:
            pods:
              cidrBlocks:
                - 172.16.0.0/16
            serviceDomain: PLACEHOLDER_SERVICE_DOMAIN
            services:
              cidrBlocks:
                - 172.17.0.0/16
          topology:
            class: default  # REPLACE with your cluster class
            controlPlane:
              replicas: 3
            version: PLACEHOLDER_VERSION
            workers:
              machineDeployments:
                - class: default-worker
                  name: worker
                  replicas: PLACEHOLDER_NODES
      # Field mapping: specify where to inject the node count
      node_count_path: 'spec.topology.workers.machineDeployments[0].replicas'
