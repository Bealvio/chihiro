apiVersion: v1
kind: Secret
metadata:
  name: chihiro-secrets
type: Opaque
stringData:
  # Generate a secure random 32+ byte key for session encryption
  # Example: openssl rand -base64 32
  session_key: "REPLACE_WITH_RANDOM_32_BYTE_KEY"
  # Your OIDC client secret
  client_secret: "REPLACE_WITH_OIDC_CLIENT_SECRET"
  # Redis password (if using authentication)
  redis_password: ""
